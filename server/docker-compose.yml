services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: world_empire
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  server:
    build: .
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/world_empire
      JWT_SECRET: change-this-long-random-secret
      TICK_SECONDS: 30
      DEV_EMAIL: owner@example.com
      DEV_PASSWORD: ChangeMe123!
    ports:
      - "3000:3000"
volumes:
  pgdata:
